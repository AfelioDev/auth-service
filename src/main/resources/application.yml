spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}?currentSchema=${PGSCHEMA:auth}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      connection-init-sql: "SET search_path TO ${PGSCHEMA:auth}"
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: ${PGSCHEMA:auth}
    schemas: ${PGSCHEMA:auth}
    create-schemas: true
  jackson:
    default-property-inclusion: always

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  secret: ${JWT_SECRET:change-me-must-be-at-least-32-characters-long}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

wca:
  client-id: ${WCA_CLIENT_ID:}
  client-secret: ${WCA_CLIENT_SECRET:}
  redirect-uri: ${WCA_REDIRECT_URI:http://localhost:8080/auth/wca/callback}
  auth-url: ${WCA_AUTH_URL:https://www.worldcubeassociation.org/oauth/authorize}
  token-url: ${WCA_TOKEN_URL:https://www.worldcubeassociation.org/oauth/token}
  me-url: ${WCA_ME_URL:https://www.worldcubeassociation.org/api/v0/me}

frontend:
  callback-url: ${FRONTEND_CALLBACK_URL:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

logging:
  level:
    com.authservice: INFO
