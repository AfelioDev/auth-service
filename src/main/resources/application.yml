spring:
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}?currentSchema=${PGSCHEMA:auth}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      connection-init-sql: "SET search_path TO ${PGSCHEMA:auth}"
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: ${PGSCHEMA:auth}
    schemas: ${PGSCHEMA:auth}
    create-schemas: true
  jackson:
    default-property-inclusion: always

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  secret: ${JWT_SECRET:change-me-must-be-at-least-32-characters-long}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

wca:
  client-id: ${WCA_CLIENT_ID:}
  client-secret: ${WCA_CLIENT_SECRET:}
  redirect-uri: ${WCA_REDIRECT_URI:http://localhost:8080/auth/wca/callback}
  auth-url: ${WCA_AUTH_URL:https://www.worldcubeassociation.org/oauth/authorize}
  token-url: ${WCA_TOKEN_URL:https://www.worldcubeassociation.org/oauth/token}
  me-url: ${WCA_ME_URL:https://www.worldcubeassociation.org/api/v0/me}

google:
  # Web Client ID registered in Google Cloud Console. Used as the 'aud' claim
  # validation target for Google id_tokens sent by iOS, Android, and web clients.
  client-id: ${GOOGLE_CLIENT_ID:}

apple:
  # Bundle ID of the iOS app — validated as 'aud' when the token comes from
  # native Sign in with Apple on iOS.
  bundle-id: ${APPLE_BUNDLE_ID:}
  # Services ID — validated as 'aud' when the token comes from the Android/web
  # flow (Sign in with Apple via web authentication).
  services-id: ${APPLE_SERVICES_ID:}
  team-id: ${APPLE_TEAM_ID:}
  key-id: ${APPLE_KEY_ID:}
  # Private key (.p8) content, PEM-formatted. Multi-line env var; keep the
  # BEGIN/END markers intact.
  private-key: ${APPLE_PRIVATE_KEY:}
  # Content of apple-developer-domain-association.txt, served as-is at
  # /.well-known/apple-developer-domain-association.txt for Apple's verification.
  domain-association: ${APPLE_DOMAIN_ASSOCIATION:}

frontend:
  callback-url: ${FRONTEND_CALLBACK_URL:}
  # Comma-separated list of allowed redirect URIs (exact prefix match).
  # Required to prevent open redirect attacks when clients pass redirect_uri.
  # Example: onetimer://callback,https://my-web-app.com/auth/callback
  allowed-redirect-uris: ${ALLOWED_REDIRECT_URIS:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

social-service:
  base-url: ${SOCIAL_SERVICE_URL:http://social-service:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    com.authservice: INFO
